<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup|danielambrose</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <section class="forms signup">
      <h1 style="color: var(--purple);">SIGN UP</h1>
      <p  style="color: var(--purple);">CREATE NEW ACCOUNT</p>

      <label class="input-group" for="signup-username" aria-label="Username for sign up">
        <i class="fa-solid fa-user"></i>
        <input id="signup-username" type="text" placeholder="username" required />
      </label>

      <label class="input-group" for="signup-email" aria-label="Email address for sign up">
        <i class="fa-solid fa-envelope"></i>
        <input id="signup-email" type="email" placeholder="someone@gmail.com" required />
      </label>

      <label class="input-group" for="signup-password" aria-label="Password for sign up">
        <i class="fa-solid fa-lock"></i>
        <input id="signup-password" type="password" placeholder="••••••••••••" required />
      </label>
      <button type="submit">SIGN UP</button>
    </section>
</body>
</html>
