<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login|danielambrose</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <section class="forms login">

      <h1>LOGIN</h1>
      <p >WELCOME BACK</p>

      <label class="input-group" for="login-email" aria-label="Email address for login">
        <i class="fa-solid fa-envelope"></i>
        <input id="login-email" type="email" placeholder="someone@gmail.com" required />
      </label>

      <label class="input-group" for="login-password" aria-label="Password for login">
        <i class="fa-solid fa-lock"></i>
        <input id="login-password" type="password" placeholder="••••••••••••" required />
      </label>

      <button type="submit">LOGIN</button>
    </section> 
</body>
</html>
